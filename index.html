<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sashi ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #ff9ec4, #ffc3e6);
        font-family: 'Roboto', sans-serif;
        overflow-x: hidden;
        position: relative;
        padding: 10px;
        box-sizing: border-box;
    }

    .card {
        background: linear-gradient(135deg, #fff0f5, #ffe4f0);
        padding: 35px 20px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        position: relative;
        width: 100%;
        max-width: 320px;
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        color: #e91e63;
        margin-bottom: 50px;
        font-size: 1.6em;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: absolute;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    #yesBtn {
        background-color: #ff4081;
        color: white;
        left: 25%;
        top: 65%;
        transform-origin: center;
        font-size: 20px;
        width: 70px;
    }

    #noBtn {
        background-color: #9e9e9e;
        color: white;
        left: 55%;
        top: 65%;
    }

    .celebration {
        font-size: 50px;
        animation: pop 0.6s ease forwards;
    }

    .heart {
        position: absolute;
        width: 15px;
        height: 15px;
        background-color: #ff4081;
        transform: rotate(45deg);
        top: 50%;
        left: 50%;
        animation: floatUp 3s linear infinite;
    }

    .heart::after, .heart::before {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        background-color: #ff4081;
        border-radius: 50%;
    }

    .heart::before { top: -7.5px; left: 0; }
    .heart::after { top: 0; left: -7.5px; }

    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    @keyframes floatUp { 0% { transform: translate(0,0) rotate(45deg); opacity:1;} 100% { transform: translate(-50px,-200px) rotate(45deg); opacity:0;} }

    #passwordPrompt {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        flex-direction: column;
        color: white;
        font-size: 18px;
        padding: 15px;
        box-sizing: border-box;
    }

    .password-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 280px;
        transform: translateY(-5%);
    }

    #passwordInput {
        padding: 10px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        width: 100%;
        text-align: center;
    }

    #passwordBtn {
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background-color: #ff4081;
        color: white;
        cursor: pointer;
        width: 100%;
    }

  .card1 {
    position: absolute;
    top: 345px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    color: white;
    font-size: 16px;
    padding: 10px 15px;
    border-radius: 15px;
    background: rgb(204 53 192 / 40%);
    backdrop-filter: blur(8px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.header1{
     margin-bottom: 10px;
}

    .final-photo {
        width: 70%;
        margin-top: -20px;
        max-width: 200px;
        max-height: 300px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    @media (max-width: 500px) {
        .card { padding: 20px 15px; max-width: 90%; }
        h1 { font-size: 1.4em; }
        button { font-size: 14px; padding: 8px 15px; }
        #passwordPrompt { font-size: 16px; }
        .password-container { transform: translateY(0); max-width: 90%; }
    }
</style>
</head>
<body>

<div id="passwordPrompt">

      <div class="card1" style="font-size:16px;">
            Напиши паролата, за да отвориш своята картичка
        </div>
    <div class="password-container">
        
        <div style="font-size:16px;">
            Напиши паролата, за да отвориш своя подарък 💝
        </div>

        <input type="password" id="passwordInput" placeholder="Въведи парола..." />

        <button id="passwordBtn">Отвори 🎁</button>
    </div>
</div>

<div class="card" id="card" style="display:none;">
    <h1>Готова ли си за един специален ден?</h1>
    <button id="yesBtn">Да</button>
    <button id="noBtn">Не</button>
</div>

<script>
const correctPassword = 'слънце';
const passwordPrompt = document.getElementById('passwordPrompt');
const passwordInput = document.getElementById('passwordInput');
const passwordBtn = document.getElementById('passwordBtn');
const card = document.getElementById('card');

passwordBtn.addEventListener('click', () => {
    if(passwordInput.value === correctPassword){
        passwordPrompt.style.display = 'none';
        card.style.display = 'flex';
    } else {
        alert('Грешна парола, опитай пак!');
    }
});

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
let yesScale = 1;

noBtn.addEventListener("click", () => {
    const randomX = Math.floor(Math.random() * 70);
    const randomY = Math.floor(Math.random() * 60);
    noBtn.style.left = randomX + "%";
    noBtn.style.top = randomY + "%";
    yesScale += 0.2;
    yesBtn.style.transform = `scale(${yesScale})`;
});

yesBtn.addEventListener("click", () => {
    card.innerHTML = `
        <h1 class="header1">Честит рожден ден, слънце ❤️</h1>
        <p style="margin-top:15px; font-size:18px;">
    Днес официално се забранява:<br>
    ❌ лошо настроение<br>
    ❌ скучен характер<br><br>

    Ии ако някой те пита какво ставаш днес…<br>
    просто отговори: „по-красива от вчера“ 😏✨<br><br>
        </p>
        <img src="https://raw.githubusercontent.com/LyubenK10/Secret/refs/heads/main/IMG_3029.jpeg" alt="Special photo" class="final-photo"/>
    `;

    for(let i=0; i<30; i++) {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = 2 + Math.random()*3 + 's';
        document.body.appendChild(heart);
    }
});
</script>

</body>
</html>
